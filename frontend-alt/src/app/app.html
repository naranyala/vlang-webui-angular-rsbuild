<div class="container">
  <h1>🔋 Battery Monitor</h1>
  <div class="battery-icon">{{ icon() }}</div>
  <div class="battery-percent" [style.color]="color()">{{ percent() }}%</div>
  <div class="battery-bar-container">
    <div class="battery-bar" [ngClass]="barClass()" [style.width.%]="percent()"></div>
  </div>
  <div class="info">
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="status-badge" [ngClass]="status().toLowerCase()">{{ status() }}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Time Left</span>
      <span class="info-value">{{ timeLeft() }}</span>
    </div>
  </div>
  <button class="refresh-btn" (click)="refresh()">🔄 Refresh</button>
  <div class="updated">Last updated: {{ lastUpdated() }}</div>
</div>
